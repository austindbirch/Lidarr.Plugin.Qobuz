name: unit-tests
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run QobuzSearchQuery unit tests
        run: dotnet test test/QobuzSearchQuery.Tests/QobuzSearchQuery.Tests.csproj --verbosity normal
